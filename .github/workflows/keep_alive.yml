name: Keep API Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: curl -s -I https://careerpilot-api-kowl.onrender.com/api/
